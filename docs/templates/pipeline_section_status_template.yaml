# Schema template for PIPELINE_SECTION_STATUS.yaml files.
#
# One PIPELINE_SECTION_STATUS.yaml exists per dataset, at:
#   src/rts_predict/<game>/reports/<dataset>/PIPELINE_SECTION_STATUS.yaml
#
# This file defines the authoritative schema for those status files.
# See also: docs/templates/step_status_template.yaml (upstream)
#           docs/templates/phase_status_template.yaml (downstream)
#
# References:
#   - docs/TAXONOMY.md -- definitions of Phase, Pipeline Section, Step
#   - docs/PHASES.md   -- canonical Pipeline Section list (numbers, names)

# -- File identity --
file_path:
  value: "src/rts_predict/<game>/reports/<dataset>/PIPELINE_SECTION_STATUS.yaml"
  required: false
  # Inferred from directory structure; omitted in practice.

game:
  value: "<sc2 | aoe2>"
  required: true

dataset:
  value: "<sc2egset | aoe2companion | aoestats>"
  required: true

# -- Derivation --
derived_from:
  value: "src/rts_predict/<game>/reports/<dataset>/STEP_STATUS.yaml"
  required: true

feeds:
  value: "src/rts_predict/<game>/reports/<dataset>/PHASE_STATUS.yaml"
  required: true

# -- Pipeline Sections --
pipeline_sections:
  description: >
    Map of section number (string "NN_NN") to section entry.
    Only active phase pipeline sections are listed (added incrementally
    as phases activate). This is intentional asymmetry with PHASE_STATUS.yaml,
    which lists all 7 phases. Pipeline sections are not pre-populated for
    not_started phases.
  entry_schema:
    section_number:
      value: "<NN_NN>"        # Phase_Section string key, e.g. "01_01"
      required: true
    name:
      value: "<pipeline section name from docs/PHASES.md>"
      required: true
    phase:
      value: "<NN>"           # Two-digit phase number string
      required: true
    status:
      value: "<not_started | in_progress | complete>"
      required: true

# -- Derivation rule --
derivation_rule:
  description: >
    Pipeline section status is derived from step statuses:
      complete    -- all steps for this pipeline section are complete
      in_progress -- any step for this pipeline section is in_progress or complete
      not_started -- no step for this pipeline section has started
  required: false
  # Informational. Not a field to be filled in.
