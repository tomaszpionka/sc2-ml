# Template for the overall structure of research log documents.
#
# STRUCTURE OVERVIEW
# ------------------
# The research log is split into per-dataset logs plus a root index:
#
#   Root index (CROSS entries only):
#     reports/research_log.md
#
#   Per-dataset logs (dataset-specific entries):
#     src/rts_predict/games/<game>/datasets/<dataset>/reports/research_log.md
#
# Per-dataset logs follow the same schema described in this template.
# Root log contains only CROSS entries (cross-dataset or game-agnostic)
# and index links to per-dataset logs. Dataset-specific entries MUST NOT
# be written to the root log.
#
# This template is the container template -- it documents what each research
# log document must contain. Individual entry structure is defined in:
#   docs/templates/research_log_entry_template.yaml
#
# Note: docs/research/RESEARCH_LOG_ENTRY.md is a human-readable rendering of
# the entry template (research_log_entry_template.yaml). The YAML template
# is the authoritative schema; the .md rendering is a convenience for authors.
#
# References:
#   - docs/TAXONOMY.md -- definitions of Phase, Pipeline Section, Step
#   - docs/templates/research_log_entry_template.yaml -- entry-level schema

document:
  path: "src/rts_predict/games/<game>/datasets/<dataset>/reports/research_log.md"
  description: >
    Per-dataset chronological narrative of all research decisions and
    findings for one dataset. Newest entries first. For CROSS entries
    (cross-dataset or game-agnostic), use reports/research_log.md
    (root index) instead.
  note: >
    The root log at reports/research_log.md is index-only. It lists
    per-dataset logs and contains only CROSS-tagged entries. All
    dataset-specific entries belong in the per-dataset log.
  required: true

header:
  thesis_title:
    value: "<full thesis title>"
    required: true
  ordering:
    value: "Reverse chronological (newest first)"
    required: false
  required: true

entry_template:
  path: "docs/templates/research_log_entry_template.yaml"
  markdown_rendering: "docs/research/RESEARCH_LOG_ENTRY.md"
  required: true

hierarchy_linking:
  description: >
    Each entry's title includes a Phase/Step reference
    (e.g., "[Phase 01 / Step 01_01_01]") that links it to the
    Phase > Pipeline Section > Step hierarchy. Non-Phase entries
    use [CROSS] or [CHORE] tags. The Pipeline Section is
    implicit in the Step number (first two components).
  required: true

dataset_tags:
  allowed: ["sc2egset", "aoe2companion", "aoestats", "CROSS"]
  description: >
    Every entry must specify its dataset scope. CROSS is used for
    entries that span multiple datasets or are game-agnostic.
  required: true

cross_references:
  to_roadmaps: >
    Entry artifacts must match paths declared in the ROADMAP step
    definition's outputs field.
  to_step_status: >
    Completion of a research log entry is a prerequisite for marking
    a Step as complete in STEP_STATUS.yaml.
  required: true
