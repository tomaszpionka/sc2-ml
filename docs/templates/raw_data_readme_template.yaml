# Raw Data README Template (v2)
#
# Canonical schema for raw/README.md files across all game datasets.
# A raw README documents identity, provenance, content, temporal coverage,
# acquisition filtering, verification, immutability, and known limitations
# for one raw directory.
#
# Authoritative sources:
#   Canonical Phases      docs/PHASES.md
#   Scientific Invariants .claude/scientific-invariants.md
#   Exploration Manual    docs/INDEX.md -> 01_DATA_EXPLORATION_MANUAL.md
#
# How to use:
#   1. Copy the YAML block below into the relevant raw README or use it as a
#      checklist when authoring or auditing a raw/README.md file.
#   2. Replace every <PLACEHOLDER> token with a concrete value drawn from
#      Phase 01 profiling artifacts (01_01_01 and related notebooks).
#   3. Fields marked required: true must be populated. Fields marked
#      required: false may be omitted entirely (do not leave them as
#      empty strings -- remove the key).
#   4. If a required field is genuinely not applicable, keep the key
#      but add a one-line comment explaining why.
#   5. Do not add new fields without updating this template first.
#   6. Concrete-looking values appear ONLY in Section Z (Examples Appendix).
#      The template body uses <PLACEHOLDER> tokens exclusively.
#
# Relationship to scientific invariants:
#   Invariant #6 (Reproducibility)  -- Sections B and F: source URLs,
#       acquisition method, and verification mechanisms must accompany the data.
#   Invariant #7 (No magic numbers) -- Section E: every acquisition filter
#       must state its rule, justification, and exact item-count impact.
#       Tilde estimates are not acceptable.
#   Invariant #8 (Cross-game comparability) -- This schema is game-agnostic;
#       both SC2 and AoE2 raw directories use the same fields.
#
# ---- TEMPLATE START (copy below this line) ----

# ── Section A: Identity ──────────────────────────────────────────────────────

game:
  value: "<GAME_ID>"              # Game identifier. Allowed: sc2 | aoe2
  required: true

dataset:
  value: "<DATASET_ID>"           # Dataset identifier matching the directory name
  required: true

raw_directory:
  value: "<RAW_DIRECTORY_PATH>"   # Path relative to the repository root
  required: true

# ── Section B: Provenance ────────────────────────────────────────────────────
# Invariant #6: source URL, acquisition method, and creator must be recorded
# alongside the data so that any result can be traced back to its origin.

source_name:
  value: "<SOURCE_NAME>"
  # Human-readable name of the data source as it appears in the literature.
  required: true

source_url:
  value: "<SOURCE_URL>"
  # Primary download URL or API endpoint. For CDN sources record the base URL.
  required: true

source_type:
  value: "<SOURCE_TYPE>"
  # How data was obtained. Allowed: api | cdn_download | web_scrape |
  #   database_export | manual
  required: true

source_version:
  value: "<SOURCE_VERSION>"
  # Version tag, commit SHA, or release identifier of the specific snapshot
  # acquired. Omit this key if the source has no versioning scheme.
  required: false

source_doi:
  value: "<SOURCE_DOI>"
  # DOI of the dataset or paper if one exists (e.g., "10.1234/example").
  # Omit this key if no DOI exists.
  required: false

data_creator:
  value: "<DATA_CREATOR>"
  # Who created the original data (person, team, or organization), distinct
  # from the redistributor or download host. Required for thesis attribution.
  required: true

sampling_mechanism:
  value: "<SAMPLING_MECHANISM>"
  # How records were selected for inclusion in the dataset.
  # Allowed values (non-exhaustive): exhaustive | convenience | stratified |
  #   tournament_only | api_paginated | manual_curation
  # Describe in one sentence if none of the above applies.
  required: true

manifest_path:
  value: "<MANIFEST_PATH>"
  # Path to the manifest or index file used during acquisition.
  # Omit this key entirely if no manifest exists.
  required: false

citation:
  value: "<BIBTEX_KEY>"
  # BibTeX key or full citation string. Used by thesis writing agents to
  # trace prose claims in Chapter 4 (Data and Methodology, §4.1 Datasets)
  # back to the raw data without additional searches.
  required: true

license:
  value: "<LICENSE>"
  # SPDX identifier (e.g., CC-BY-4.0, MIT) or a plain description if no
  # SPDX identifier exists. Check the source repository's LICENSE file.
  required: true

access_restrictions:
  value: "<ACCESS_RESTRICTIONS>"
  # Any access restrictions beyond the license (account required, rate limits,
  # geographic restrictions). Omit this key if there are no restrictions.
  required: false

acquisition_date:
  value: "<ACQUISITION_DATE>"
  # ISO 8601 date or date range (YYYY-MM-DD or YYYY-MM-DD to YYYY-MM-DD).
  # For multi-batch downloads, list all dates.
  required: true

acquisition_script:
  value: "<ACQUISITION_SCRIPT_PATH>"
  # Path to the download or acquisition script.
  # Omit this key if data was downloaded manually without a script.
  required: false

# ── Section C: Content and Layout ───────────────────────────────────────────

description:
  value: "<DESCRIPTION>"
  # 1-3 sentences describing what this raw data contains and why it exists.
  required: true

file_format:
  value: "<FILE_FORMAT>"
  # Primary file format(s). List multiple if the directory contains mixed
  # formats (e.g., "parquet, CSV").
  required: true

subdirectory_layout:
  # List of subdirectories (or top-level file groups) with contents and
  # naming patterns.
  # Invariant #7: naming patterns and file counts are empirical findings
  # derived during Phase 01 profiling (01_01_01 notebook), not guesses.
  # All counts and sizes must be populated from the inventory artifact.
  required: true
  value:
    - directory: "<SUBDIRECTORY_PATH>"
      contents: "<CONTENTS_DESCRIPTION>"
      file_pattern: "<FILE_PATTERN>"   # e.g., "{hash}.SC2Replay.json" or "match-{date}.parquet"
      file_count: <FILE_COUNT>         # exact integer from 01_01_01 artifact
      size_mb: <SIZE_MB>               # float, uncompressed size in MB

total_files:
  value: <TOTAL_FILE_COUNT>
  # Total file count in the raw directory, excluding dotfiles
  # (any file whose name starts with ".": .gitkeep, .DS_Store, etc.).
  # Must match the sum across subdirectory_layout entries and be verified
  # against the 01_01_01 file inventory artifact.
  # Invariant #7: this must be an exact integer, not an approximation.
  required: true

total_size_mb:
  value: <TOTAL_SIZE_MB>
  # Total uncompressed size in MB. Float. Verified post-extraction.
  # Invariant #7: must be a measured value, not an estimate.
  required: true

# ── Section D: Temporal Coverage ────────────────────────────────────────────

temporal_grain:
  value: "<TEMPORAL_GRAIN>"
  # Granularity of temporal records. Allowed:
  #   per_game | daily | weekly | snapshot | mixed
  required: true

date_range_start:
  value: "<DATE_RANGE_START>"
  # ISO 8601 date of the earliest record in the dataset.
  # Invariant #7: must be derived from Phase 01 profiling, not assumed.
  required: true

date_range_end:
  value: "<DATE_RANGE_END>"
  # ISO 8601 date of the latest record in the dataset.
  # Invariant #7: must be derived from Phase 01 profiling, not assumed.
  required: true

known_gaps:
  # List of known temporal gaps (tournaments, periods, or partitions with
  # no data). Set to an empty list [] if no gaps are known.
  # "None found" and "not investigated" are both expressed via gap_analysis_status
  # below -- do not conflate them by omitting this key.
  # Invariant #7: gap date ranges must come from Phase 01 profiling.
  required: true
  value:
    - gap_start: "<GAP_START_DATE>"    # ISO 8601
      gap_end: "<GAP_END_DATE>"        # ISO 8601
      reason: "<GAP_REASON>"

gap_analysis_status:
  value: "<GAP_ANALYSIS_STATUS>"
  # Whether gaps have been fully investigated.
  # Allowed: complete | partial | not_started
  # "complete"     = all subdirectories checked via 01_01_01; known_gaps is authoritative
  # "partial"      = some subdirectories checked; known_gaps may be incomplete
  # "not_started"  = gap analysis has not yet been performed
  required: true

coverage_notes:
  value: "<COVERAGE_NOTES>"
  # Additional context about temporal coverage that does not fit in the
  # structured fields above. Omit this key if no additional notes are needed.
  required: false

# ── Section E: Acquisition Filtering ────────────────────────────────────────
# Invariant #7 (No magic numbers): Every filter applied during acquisition
# must state the rule, a justification traceable to empirical evidence or
# literature, and the EXACT count of excluded items. Tilde estimates (~N)
# and free-text impact strings are not acceptable.

acquisition_filters:
  # Filters applied during download (items available at source that were
  # intentionally not downloaded or were dropped after download).
  # Set to an empty list [] if no filtering was performed.
  # Omit this key only if it is certain that no filtering occurred.
  required: false
  value:
    - rule: "<FILTER_RULE_DESCRIPTION>"
      justification: "<FILTER_JUSTIFICATION>"
      # Justification must cite empirical evidence or literature where possible.
      excluded_count: <EXCLUDED_COUNT>
      # Exact integer. Must be derived from the acquisition script logs or
      # Phase 01 profiling. Tilde estimates are not acceptable (Invariant #7).
      excluded_count_source: "<EXCLUDED_COUNT_SOURCE>"
      # How excluded_count was derived. Examples:
      #   "acquisition script log at acquisition_date"
      #   "01_01_01 profiling artifact"
      #   "manifest comparison (total manifest entries minus downloaded files)"
      notes: "<OPTIONAL_FILTER_NOTES>"
      # Optional: additional context that does not fit in rule/justification.
      # Omit this key on a filter entry if no notes are needed.

excluded_formats:
  # Formats or data types available at the source but intentionally not
  # downloaded (e.g., CSV equivalents when parquet was chosen instead).
  # Omit this key if nothing was excluded by format choice.
  required: false
  value:
    - format: "<EXCLUDED_FORMAT>"
      reason: "<FORMAT_EXCLUSION_REASON>"

# ── Section F: Verification ──────────────────────────────────────────────────
# Invariant #6 (Reproducibility): Checksums or other verification mechanisms
# must be recorded so post-download integrity can be confirmed.

checksum_status:
  value: "<CHECKSUM_STATUS>"
  # Whether checksums are available for files in this directory.
  # Allowed: full | partial | none
  # "full"    = checksums available for all files
  # "partial" = checksums available for some but not all files
  # "none"    = no checksums available
  required: true

checksum_source:
  value: "<CHECKSUM_SOURCE>"
  # Where checksums come from (manifest field name, sidecar file, etc.).
  # Required if checksum_status is "full" or "partial". Omit if "none".
  required: false
  # Conditional: required when checksum_status != none

checksum_coverage_pct:
  value: <CHECKSUM_COVERAGE_PCT>
  # Integer 0-100. Percentage of files covered by checksums.
  # Required if checksum_status is "partial". Omit otherwise.
  required: false
  # Conditional: required when checksum_status == partial

unchecksummed_pattern:
  value: "<UNCHECKSUMMED_PATTERN>"
  # Glob or description identifying which files lack checksums.
  # Useful when checksum_status is "partial". Omit if not applicable.
  required: false

checksum_verified:
  value: <CHECKSUM_VERIFIED>
  # Boolean. Whether checksums were verified against downloaded files.
  # Required if checksum_status is "full" or "partial". Omit if "none".
  required: false
  # Conditional: required when checksum_status != none

verification_date:
  value: "<VERIFICATION_DATE>"
  # ISO 8601 date on which checksums were verified.
  # Required if checksum_verified is true. Omit otherwise.
  required: false
  # Conditional: required when checksum_verified == true

# ── Section G: Immutability and Artifact Link ────────────────────────────────

immutability:
  # Raw data is never modified after acquisition. This block documents the
  # status and mechanism that enforces (or merely declares) immutability.
  required: true
  status: true
  # Always true. Violations invalidate the entire experiment trail.
  enforcement_mechanism: "<ENFORCEMENT_MECHANISM>"
  # How immutability is enforced or declared. Allowed:
  #   "none_documented"          -- convention only, no technical enforcement
  #   "read_only_permissions"    -- file system permissions set to read-only
  #   "git_lfs_tracked"          -- files tracked in Git LFS (write-protected)
  #   "directory_hash_verified"  -- directory hash computed and logged at acquisition
  # Use "none_documented" if the raw directory is protected only by team convention.

inventory_artifact:
  value: "<INVENTORY_ARTIFACT_PATH>"
  # Path to the 01_01_01 file inventory artifact produced by Phase 01.
  # This artifact provides machine-readable per-directory file counts and
  # sizes that validate the totals reported in Section C.
  # Invariant #6: this cross-reference is required for reproducibility.
  # If Phase 01 profiling has not yet been completed, set value to:
  #   "PENDING: 01_01_01 not yet run"
  # The README is not considered complete until this is a real artifact path.
  required: true

notes:
  value: "<NOTES>"
  # Free-form notes: deferred acquisition status, known issues, re-acquisition
  # instructions, or anything that does not fit the structured fields above.
  # Omit this key if no additional notes are needed.
  required: false

# ── Section H: Known Limitations ────────────────────────────────────────────
# Informed by Gebru et al. (2021) "Datasheets for Datasets" -- thesis-relevant
# subset. See "Not Covered" block at the end of this file for deferred questions.

known_biases:
  value: "<KNOWN_BIASES>"
  # Describe selection, survivorship, geographic, or demographic biases
  # present in this dataset. Use "None known" if no biases have been
  # identified, but do not omit the field -- its absence is ambiguous.
  required: true

representativeness_notes:
  value: "<REPRESENTATIVENESS_NOTES>"
  # Who or what is over- or under-represented relative to the real-world
  # population the dataset is intended to cover. Omit this key if no
  # representativeness concerns have been identified.
  required: false

