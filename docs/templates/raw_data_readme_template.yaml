# ── Not Covered (deferred Gebru et al. questions) ───────────────────────────
#
# The following questions from Gebru et al. (2021) "Datasheets for Datasets"
# are intentionally deferred for this thesis. Each entry notes the reason.
#
# 1. Ethical review / IRB approval
#    Reason: All datasets are publicly released tournament replays or CDN dumps
#    of in-game data. No human subjects research is involved. If this changes
#    (e.g., player survey data), revisit.
#
# 2. Preprocessing performed at source before publication
#    Reason: Not documented by the data creators for any of the three datasets.
#    Noted as a limitation in thesis Chapter 4; out of scope for this template.
#
# 3. Reuse conditions beyond the stated license
#    Reason: License field covers the primary reuse condition. Fine-grained
#    reuse restrictions (e.g., non-commercial only, no derivative datasets)
#    should be noted in `access_restrictions` if applicable; no dedicated field
#    is added here to avoid duplication.
#
# 4. Update / maintenance schedule
#    Reason: All three datasets are treated as static snapshots acquired on a
#    fixed date. Ongoing update monitoring is out of scope for a fixed-snapshot
#    thesis analysis.
#
# 5. Collector vs. creator distinction beyond data_creator
#    Reason: The `data_creator` field captures the original creator. The
#    redistributor (CDN host, GitHub mirror) is captured in `source_url`.
#    A full provenance chain (creator -> publisher -> mirror -> us) is not
#    required for the three datasets in scope.
#
# 6. Intended vs. actual use alignment
#    Reason: Addressed qualitatively in thesis Chapter 4, §4.1 (Datasets)
#    and §4.2 (Data Preprocessing). No structured field added.
#
# 7. Full dataset statistics / data distributions
#    Reason: Captured in Phase 01 profiling artifacts (01_01_01 through
#    01_01_NN notebooks) and referenced via `inventory_artifact`. A separate
#    structured field would duplicate those outputs.
