dag_id: "dag_session_audit_dashboard"
spec_ref: "planning/current_plan.md"
category: "C"
branch: "chore/session-audit-dashboard"
base_ref: "master"
default_isolation: "shared_branch"

jobs:
  - job_id: "J01"
    name: "Session audit dashboard"

    task_groups:
      - group_id: "TG01"
        name: "Consolidate hook logs"
        depends_on: []
        review_gate:
          agent: "reviewer"
          scope: "diff"
          on_blocker: "halt"
        tasks:
          - task_id: "T01"
            name: "Update log-subagent.sh — paths + project field"
            agent: "executor"
            spec_ref: "planning/current_plan.md#S1a"
            file_scope:
              - "scripts/hooks/log-subagent.sh"
            parallel_safe: true
            depends_on: []
          - task_id: "T02"
            name: "Update log-bash.sh — path + project field"
            agent: "executor"
            spec_ref: "planning/current_plan.md#S1b"
            file_scope:
              - "scripts/hooks/log-bash.sh"
            parallel_safe: true
            depends_on: []
          - task_id: "T03"
            name: "Update hooks README"
            agent: "executor"
            spec_ref: "planning/current_plan.md#S1c"
            file_scope:
              - "scripts/hooks/README.md"
            parallel_safe: true
            depends_on: []
          - task_id: "T04"
            name: "Migrate old logs — stage, prepend, cleanup"
            agent: "executor"
            spec_ref: "planning/current_plan.md#Migration"
            file_scope: []
            parallel_safe: false
            depends_on: ["T01", "T02"]

      - group_id: "TG02"
        name: "Create dashboard script"
        depends_on: ["TG01"]
        review_gate:
          agent: "reviewer"
          scope: "diff"
          on_blocker: "halt"
        tasks:
          - task_id: "T05"
            name: "Write scripts/session_audit.py"
            agent: "executor"
            spec_ref: "planning/current_plan.md#S2"
            file_scope:
              - "scripts/session_audit.py"
            read_scope:
              - "session_audit.md"
              - "scripts/hooks/log-subagent.sh"
              - "scripts/hooks/log-bash.sh"
            parallel_safe: false
            depends_on: []

      - group_id: "TG03"
        name: "Cleanup + CHANGELOG"
        depends_on: ["TG02"]
        review_gate:
          agent: "reviewer"
          scope: "cumulative"
          on_blocker: "halt"
        tasks:
          - task_id: "T06"
            name: "Delete static reports, update CHANGELOG"
            agent: "executor"
            spec_ref: "planning/current_plan.md#S3"
            file_scope:
              - "CHANGELOG.md"
              - "session_audit.md"
              - "session_audit_plan.md"
            parallel_safe: false
            depends_on: []

final_review:
  agent: "reviewer-deep"
  scope: "all"
  base_ref: "master"
  on_blocker: "halt"

failure_policy:
  on_failure: "halt"
