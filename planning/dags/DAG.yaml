dag_id: "dag_token_economy_followup"
plan_ref: "planning/current_plan.md"
category: "C"
branch: "chore/token-economy-indexing"
base_ref: "master"
default_isolation: "shared_branch"

jobs:
  - job_id: "J01"
    name: "Follow-up fixes for token economy PR"

    task_groups:
      - group_id: "TG01"
        name: "Drift tests + aoe2 README + Strategy A/B"
        depends_on: []
        review_gate:
          agent: "reviewer"
          scope: "diff"
          on_blocker: "halt"
        tasks:
          - task_id: "T01"
            name: "Planning drift hook: main() integration tests + bug fixes"
            spec_file: "planning/specs/spec_01_drift_tests.md"
            agent: "executor"
            parallel_safe: true
            file_scope:
              - "scripts/hooks/check_planning_drift.py"
              - "tests/infrastructure/test_check_planning_drift.py"
            depends_on: []
          - task_id: "T02"
            name: "AoE2 README: add per-dataset report/artifact paths"
            spec_file: "planning/specs/spec_02_aoe2_readme.md"
            agent: "executor"
            parallel_safe: true
            file_scope:
              - "src/rts_predict/aoe2/README.md"
            depends_on: []
          - task_id: "T03"
            name: "Strategy A/B: formalize in TAXONOMY.md + update pointers"
            spec_file: "planning/specs/spec_03_strategy_ab.md"
            agent: "executor"
            parallel_safe: true
            file_scope:
              - "docs/TAXONOMY.md"
              - "docs/agents/AGENT_MANUAL.md"
              - "planning/README.md"
            depends_on: []

      - group_id: "TG02"
        name: "CHANGELOG"
        depends_on: ["TG01"]
        review_gate:
          agent: "reviewer"
          scope: "cumulative"
          on_blocker: "halt"
        tasks:
          - task_id: "T04"
            name: "Update CHANGELOG for follow-up fixes"
            spec_file: "planning/specs/spec_04_changelog.md"
            agent: "executor"
            parallel_safe: false
            file_scope:
              - "CHANGELOG.md"
            depends_on: []

final_review:
  agent: "reviewer-deep"
  scope: "all"
  base_ref: "master"
  on_blocker: "halt"

failure_policy:
  on_failure: "halt"
