dag_id: "dag_canary_single_job"
plan_ref: "planning/current_plan.md"
category: "C"
branch: "chore/plan-template-rewrite"
base_ref: "master"
default_isolation: "shared_branch"

jobs:
  - job_id: "J01"
    name: "Canary single-job test"

    task_groups:
      - group_id: "TG01"
        name: "Write canary files"
        depends_on: []
        review_gate:
          agent: "reviewer"
          scope: "diff"
          on_blocker: "halt"
        tasks:
          - task_id: "T01"
            name: "Canary alpha"
            agent: "executor"
            spec_file: "planning/specs/spec_01_canary_alpha.md"
            file_scope:
              - "canary/01.txt"
            parallel_safe: true
            depends_on: []
          - task_id: "T02"
            name: "Canary beta"
            agent: "executor"
            spec_file: "planning/specs/spec_02_canary_beta.md"
            file_scope:
              - "canary/02.txt"
            parallel_safe: true
            depends_on: []

final_review:
  agent: "reviewer"
  scope: "all"
  base_ref: "master"
  on_blocker: "halt"

failure_policy:
  on_failure: "halt"
