# .pre-commit-config.yaml
# Hooks fire on every `git commit`. Agents no longer need to run ruff or mypy manually.
# Wall-time budget: <3s for Python-only commits, <6s for notebook commits.

repos:
  # ── Ruff lint (staged .py files only) ──────────────────────────────────────
  # Fast (~0.5s). Enforces E/F/W/I rules. --no-fix: blocks but does not modify
  # staged files; agent must fix and re-stage. Archive .py files are excluded
  # via extend-exclude in pyproject.toml.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10  # Matches pyproject.toml: ruff = "^0.9.0"
    hooks:
      - id: ruff
        args: [--no-fix]

  # ── Mypy type check (full src/ — needs full project context) ───────────────
  # Uses the project venv via `poetry run` to resolve all imports (duckdb,
  # pandas, etc.). pass_filenames: false runs mypy on all of src/rts_predict/
  # regardless of which files are staged — cross-module type errors require it.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy src/rts_predict/
        language: system
        types: [python]
        pass_filenames: false

  # ── Planning artifact validation ──────────────────────────────────────────
  # Validates planning specs and DAG for structural integrity (required sections,
  # valid spec_file refs). Runs when any file under planning/ is staged.
  - repo: local
    hooks:
      - id: planning-drift
        name: planning artifact validation
        language: system
        entry: poetry run python scripts/hooks/check_planning_drift.py
        files: ^planning/
        pass_filenames: false

  # ── Tier 7 status chain consistency ──────────────────────────────────────
  # Fires when any STEP_STATUS, PIPELINE_SECTION_STATUS, or PHASE_STATUS yaml
  # is staged. Derives expected downstream values from STEP_STATUS and flags
  # any drift. Tier 7 is non-authoritative — drift means regenerate, not edit.
  - repo: local
    hooks:
      - id: status-chain-drift
        name: status chain consistency (Tier 7)
        language: system
        entry: poetry run python scripts/hooks/check_status_chain.py
        files: (STEP_STATUS|PIPELINE_SECTION_STATUS|PHASE_STATUS)\.yaml$
        pass_filenames: false

  # ── Rule trigger glob validation ──────────────────────────────────────────
  # Fires when any .claude/rules/*.md is staged. Checks that every paths: glob
  # in the rule's frontmatter matches at least one real file. A dead glob means
  # the rule silently never fires (e.g. after a path restructure).
  - repo: local
    hooks:
      - id: rule-trigger-check
        name: .claude/rules trigger glob validation
        language: system
        entry: poetry run python scripts/hooks/check_rule_triggers.py
        files: ^\.claude/rules/
        pass_filenames: false

  # ── 01_05 spec-binding check ──────────────────────────────────────────────
  # Fires when any 01_05 Temporal & Panel EDA Python file is staged.
  # Verifies that each file's first 40 lines contain a spec-binding line:
  #   # spec: reports/specs/01_05_preregistration.md@<git-SHA>
  # No-op when no matching files are staged (Phase 01_05 not yet begun).
  - repo: local
    hooks:
      - id: check-01-05-binding
        name: Check 01_05 notebook spec-binding
        entry: python scripts/check_01_05_binding.py --check
        language: system
        files: ^sandbox/.+/01_exploration/05_temporal_panel_eda/.+\.py$
        pass_filenames: false
        stages: [commit]

  # ── Jupytext sync (notebook pairs in sandbox/) ─────────────────────────────
  # Keeps .py and .ipynb paired files in sync. Both files must be staged
  # together when committing a notebook change (sandbox/README.md rule 4).
  - repo: https://github.com/mwouts/jupytext
    rev: v1.19.1  # Must satisfy the version range in pyproject.toml (>=1.16.0,<2)
    hooks:
      - id: jupytext
        args: [--sync]
        files: ^sandbox/.*\.(ipynb|py)$
