table: matches_history_minimal
dataset: aoestats
game: aoe2
object_type: view
step: '01_04_03b'
schema_version: '10-col (AMENDMENT: canonical_slot added 2026-04-20)'
row_count: 35629894
describe_artifact: src/rts_predict/games/aoe2/datasets/aoestats/reports/artifacts/01_exploration/04_cleaning/01_04_03b_canonical_slot_amendment.json
generated_date: '2026-04-20'
columns:
- name: match_id
  type: VARCHAR
  nullable: true
  description: 'Cross-dataset unique match identifier. Format: ''<dataset_tag>::<native_id>''.
    For aoestats: ''aoestats::<game_id>'' where game_id is an opaque VARCHAR (variable
    length, no fixed-length constraint). Prefix guarantees UNION ALL uniqueness across
    sibling datasets. Provenance: game_id is VARCHAR per src/rts_predict/games/aoe2/datasets/aoestats/data/db/schemas/views/matches_1v1_clean.yaml
    (I7 -- no numeric regex applied).'
  notes: IDENTITY. Prefix applied in this VIEW only; upstream game_id unchanged (I9).
- name: started_at
  type: TIMESTAMP
  nullable: true
  description: Match start time. TIMESTAMP (no TZ) via CAST(started_timestamp AT TIME
    ZONE 'UTC' AS TIMESTAMP). Upstream matches_1v1_clean.started_timestamp is TIMESTAMP
    WITH TIME ZONE (TIMESTAMPTZ); the AT TIME ZONE 'UTC' + CAST yields a naive UTC
    TIMESTAMP consistent with the canonical cross-dataset dtype.
  notes: CONTEXT. Temporal anchor for Phase 02 rating-update loops. Chronologically
    faithful (TIMESTAMP ordering; upstream TIMESTAMPTZ preserved semantics).
- name: player_id
  type: VARCHAR
  nullable: true
  description: 'Focal player identifier. aoestats: CAST(p{0,1}_profile_id AS VARCHAR)
    (upstream BIGINT).'
  notes: IDENTITY. Per-dataset identifier; cross-dataset identity resolution is a
    future step (Phase 01_05+).
- name: opponent_id
  type: VARCHAR
  nullable: true
  description: Opposing player identifier. Same grain and provenance as player_id.
  notes: IDENTITY.
- name: faction
  type: VARCHAR
  nullable: true
  description: 'Focal player''s faction. Per-dataset polymorphic vocabulary. aoestats:
    full civilization names (Mongols, Franks, etc. -- ~50 distinct). CONSUMERS MUST
    NOT treat faction as a single categorical feature across datasets without game-conditional
    encoding.'
  notes: PRE_GAME. Full civilization name from p{0,1}_civ. Polymorphic I8 contract.
- name: opponent_faction
  type: VARCHAR
  nullable: true
  description: Opposing player's faction (same per-dataset vocabulary as `faction`).
  notes: PRE_GAME. Mirror of faction from the opponent row.
- name: won
  type: BOOLEAN
  nullable: true
  description: 'TRUE if the focal player won, FALSE otherwise. The two rows of a match
    have complementary `won` values (exactly one TRUE, one FALSE). UNION ALL erases
    upstream slot asymmetry (team=1 wins ~52.27% upstream): overall AVG(won::INT)
    == 0.5 exactly (slot-bias gate verified in 01_04_03).'
  notes: TARGET. Direct projection of p{0,1}_winner from matches_1v1_clean. Prediction
    label for downstream experiments.
- name: canonical_slot
  type: VARCHAR
  nullable: false
  description: |
    Skill-orthogonal slot identity derived from hash of match_id. Resolves the W3
    ARTEFACT_EDGE upstream API ordering artefact (01_04_05): the team column in
    matches_1v1_clean assigns team=1 to the higher-ELO player in 80.3% of games
    (mean +11.9 ELO). canonical_slot replaces team as the I5-compliant slot label
    for per-slot feature engineering in Phase 02.
    Derivation: CASE WHEN (hash(match_id) + focal_team) % 2 = 0 THEN 'slot_A'
    ELSE 'slot_B' END. Skill-orthogonal by structural construction: both rows of
    any match receive the same hash(match_id) value (UNION-ALL of a
    1-row-per-match source); the binary splitter (hash + focal_team) % 2 with
    focal_team in {0,1} distributes them into complementary slots. Independent of
    match_id's semantic content -- no empirical claim about its origin required.
    See 01_04_03b artifact for DDL + assertions.
  notes: |
    PRE_GAME. Derived slot identity for Phase 02 per-slot features. NOT the
    upstream API team label. Every match has exactly one 'slot_A' row and one
    'slot_B' row. Cardinality: exactly 2 values. NULL count: 0.
- name: duration_seconds
  type: BIGINT
  nullable: true
  description: 'Match duration in seconds (POST_GAME_HISTORICAL). For aoestats: CAST(matches_raw.duration
    / 1_000_000_000 AS BIGINT). matches_raw.duration is Arrow duration[ns] mapped
    to BIGINT NANOSECONDS by DuckDB 1.5.1 (pre_ingestion.py:271, research_log.md:684,867,988,996).
    R1-BLOCKER-A1 fix: divide by 1_000_000_000 (NOT 1_000). Both rows of a match have
    identical duration_seconds (symmetric -- same source row r.duration used in both
    UNION halves). I7 provenance: 1_000_000_000 divisor cites Arrow duration[ns] behavior
    documented at pre_ingestion.py:271.'
  notes: 'POST_GAME_HISTORICAL. Available only after match end. DO NOT use as PRE_GAME
    feature for predicting match T outcome (I3 violation). Useful for retrospective
    analysis: rating-update weighting, learning-curve measurement, game-length-conditioned
    BTL. Phase 02 feature extractors that drop POST_GAME_HISTORICAL tokens will auto-exclude.
    Unit: seconds (canonical cross-dataset unit). Source: matches_raw.duration / 1_000_000_000
    (aoestats-specific). JOIN key: matches_raw.game_id = matches_1v1_clean.game_id.
    ~145 rows (0.0005%) have outlier duration (>24h); these are raw-data corruption,
    flagged for 01_04_02 augmentation follow-up PR.'
- name: dataset_tag
  type: VARCHAR
  nullable: false
  description: Dataset discriminator for UNION ALL across sibling datasets. Constant
    'aoestats' in this VIEW.
  notes: IDENTITY. Matches the prefix before '::' in match_id.
provenance:
  source_tables:
  - matches_1v1_clean
  - matches_raw
  join_key: 'UNION ALL pivot: p0_half uses (game_id, p0_profile_id as player_id, p1_profile_id
    as opponent_id, p0_civ, p0_winner); p1_half mirrors the assignment. ADDENDUM:
    JOIN to matches_raw on game_id for duration column.'
  filter: 'Inherited from matches_1v1_clean: ranked 1v1 decisive. 17,814,947 source
    matches.'
  scope: 17,814,947 matches x 2 rows = 35,629,894 player-rows. Cross-dataset harmonization
    substrate for Phase 02+ rating backtesting.
  created_by: sandbox/aoe2/aoestats/01_exploration/04_cleaning/01_04_03_minimal_history_view.py
invariants:
- id: I3
  description: 'TIMESTAMP-typed temporal anchor. duration_seconds is POST_GAME_HISTORICAL
    (machine-grep-able token in notes): DO NOT use as PRE_GAME feature.'
- id: I5
  description: |
    Player-row symmetry (I5-analog) + deterministic skill-orthogonal slot labelling.
    Every match_id has exactly 2 rows with distinct canonical_slot values.
    duration_seconds identical in both rows. aoestats-specific SLOT-BIAS gate:
    AVG(won::INT) == 0.5 exactly. canonical_slot skill-orthogonality is established
    by construction (hash depends only on match_id, independent of any player
    property); per-slot win rate balance near 0.5 is reported as confirmatory
    evidence in 01_04_03b, not as a magic-number gate.
- id: I6
  description: CREATE OR REPLACE VIEW DDL + every assertion SQL stored verbatim in
    01_04_03b_canonical_slot_amendment.json sql_queries block (post-amendment
    source-of-truth; predecessor was 01_04_03_minimal_history_view.json pre-F1).
- id: I7
  description: 1_000_000_000 nanoseconds-to-seconds divisor cites Arrow duration[ns]
    -> BIGINT behavior documented at pre_ingestion.py:271 + research_log.md:684.
- id: I8
  description: |
    Cross-dataset comparability: 9-column shared contract (ADDENDUM: extended from 8).
    aoestats extends locally with 10th column canonical_slot VARCHAR (hash-on-match_id).
    Sibling datasets sc2egset and aoe2companion retain the 9-column contract.
    Cross-dataset UNION ALL must project the 9 shared columns only.
    duration_seconds unit is seconds across all datasets.
- id: I9
  description: Pure non-destructive projection. No raw table modified. matches_raw
    is read-only (SELECT only for duration column).
provenance_categories_note: 'Per-column ''notes'' uses vocabulary: IDENTITY, CONTEXT,
  PRE_GAME, TARGET, POST_GAME_HISTORICAL (added in ADDENDUM).'
