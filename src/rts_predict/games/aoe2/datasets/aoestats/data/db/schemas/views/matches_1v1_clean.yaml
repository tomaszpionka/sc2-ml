  description: |
    1-row-per-match invariant (asserted in 01_04_02). NOT 2-rows-per-replay
    like sc2egset. p0/p1 columns are symmetric. Phase 02 MUST randomise focal/opponent
    assignment (team=1 wins ~52.27% per 01_04_01 audit).
    W3 ARTEFACT_EDGE (01_04_05): `team` column reflects upstream API ordering
    (invite-first / matchmaking-API assignment), NOT game-mechanical slot identity.
