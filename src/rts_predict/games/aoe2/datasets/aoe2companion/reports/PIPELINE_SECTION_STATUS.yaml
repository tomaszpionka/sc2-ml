  "01_03":
    name: "Systematic Data Profiling"
    phase: "01"
    status: complete
  "01_04":
    name: "Data Cleaning"
    phase: "01"
    status: not_started
  "01_05":
    name: "Temporal & Panel EDA"
    phase: "01"
