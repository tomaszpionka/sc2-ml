  OR REPLACE VIEW. Semantics are identical to the planned VIEW -- same 8-column contract,
  same filtering, same row count. Consumer code works identically for both TABLE and
  VIEW in DuckDB SQL.'
step: '01_04_03'
row_count: 61062392
describe_artifact: src/rts_predict/games/aoe2/datasets/aoe2companion/reports/artifacts/01_exploration/04_cleaning/01_04_03_minimal_history_view.json
