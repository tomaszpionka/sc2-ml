provenance:
  source_tables:
  - matches_raw
  filter: internalLeaderboardId IN (6, 18); profileId != -1; deduplicated by (matchId,
    profileId) ORDER BY started; R03 complementarity filter (HAVING COUNT(*)=2 AND
    n_true=1 AND n_false=1)
  scope: Ranked 1v1 decisive matches only (internalLeaderboardId IN (6, 18) AND profileId
    != -1, deduplicated, won-complementary).
  row_multiplicity: '2 rows per match (player-row-oriented; one row per player). NOT
    1-row-per-match like aoestats. Upstream CTE: see sandbox/aoe2/aoe2companion/01_exploration/04_cleaning/01_04_01_data_cleaning.py
    (HAVING COUNT(*)=2 + R03 complementarity filter).'
  notes: 'Vocabulary style: prose-format per-column notes (aoestats standard). provenance_categories
    invariant block added in CROSS PR I8-harmonization (feat/01-04-02-aoe2companion).'
  created_by: sandbox/aoe2/aoe2companion/01_exploration/04_cleaning/01_04_02_data_cleaning_execution.py
