invariants:
- id: I3
  description: 'No new POST-GAME columns introduced. ratingDiff and finished remain
    excluded (verified by Section 3.3b assertion). rating_was_null derives from the
    PRE_GAME rating column only. Temporal anchor: started exposed for downstream I3-compliant
    feature queries against player_history_all.'
  provenance_categories:
  - TARGET: THE prediction label itself (Win/Loss/Undecided/Tie). Singleton sentinel
      -- only the result column carries this tag. Never aggregate without temporal
      exclusion (match_time < T); using it as a direct game-T feature IS target leakage.
  - POST_GAME_HISTORICAL: The game-T outcome itself or any feature derived from it
      (e.g., is_decisive_result, future Phase-02 win-rate aggregates). SAFE only when
      used as a player-history aggregate FILTERED by match_time < T. UNSAFE as direct
      game-T feature. The TARGET singleton is conceptually a sub-class of this category
      but tagged separately for sentinel-clarity.
  - IN_GAME_HISTORICAL: Available during/after game completion (e.g., APM, SQ, supplyCappedPercent,
      header_elapsedGameLoops, is_apm_unparseable). SAFE only when used as a player-history
      aggregate FILTERED by match_time < T. UNSAFE as direct game-T feature.
  - PRE_GAME: Available before game T starts (e.g., MMR, leaderboard, race, map).
      Safe to use as feature for game T without temporal filtering.
  - IDENTITY: Stable identifiers (replay_id, toon_id, profileId). No temporal constraint;
      not a feature input but a join key.
  - CONTEXT: Game/match metadata (started_timestamp, mapName, gameLoops). PRE_GAME-equivalent
      for temporal purposes; available before game T.
- id: I5
  description: Player-row-oriented (2 rows per match). Not 1-row-per-match like aoestats.
    matches_1v1_clean retains player-row orientation (2 rows per match). No slot-asymmetry
    introduced; both player rows treated identically.
- id: I6
  description: All DDL + assertion SQL stored verbatim in 01_04_02_post_cleaning_validation.json
    sql_queries.
- id: I7
  description: All expected counts loaded at runtime from 01_04_01_missingness_ledger.csv
    via ledger_val() helper. No magic numbers in notebook code. Plan cites ledger
    values as expected guidance; notebook derives them.
- id: I9
  description: Raw tables UNTOUCHED. Only VIEW DDL changes via CREATE OR REPLACE.
    leaderboards_raw + profiles_raw declared out-of-scope but not dropped (no DROP
    TABLE statements). No imputation, scaling, or encoding.
- id: I10
