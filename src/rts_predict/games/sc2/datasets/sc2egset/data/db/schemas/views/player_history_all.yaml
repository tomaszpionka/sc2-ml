provenance:
  source_tables:
  - replay_players_raw
  - replays_meta_raw
  join_key: NULLIF(regexp_extract(filename, '([0-9a-f]{32})\.SC2Replay\.json', 1),
    '') AS replay_id
  filter: replay_id IS NOT NULL (empty-string guard); SQ=INT32_MIN -> NULL (parse-failure
    sentinel correction); APM=0 -> NULL via NULLIF (01_04_02); selectedRace='' ->
    'Random'
  scope: All replays (no 1v1/decisive filter). Includes non-1v1 and indecisive replays
    excluded from matches_flat_clean.
  created_by: sandbox/sc2/sc2egset/01_exploration/04_cleaning/01_04_02_data_cleaning_execution.py
invariants:
- id: I3
  description: 'Temporal discipline / no future leakage. Each column carries a single-token
    provenance category in its notes: field. The vocabulary, with operational rules,
    is enumerated under provenance_categories below. Phase 02 MUST filter by match_time
    < T (the prediction target''s started_timestamp) before aggregating ANY column
    tagged TARGET, IN_GAME_HISTORICAL, or POST_GAME_HISTORICAL into a feature for
    game T.'
  provenance_categories:
  - TARGET: THE prediction label itself (Win/Loss/Undecided/Tie). Singleton sentinel
      -- only the result column carries this tag. Never aggregate without temporal
      exclusion (match_time < T); using it as a direct game-T feature IS target leakage.
  - POST_GAME_HISTORICAL: The game-T outcome itself or any feature derived from it
      (e.g., is_decisive_result, future Phase-02 win-rate aggregates). SAFE only when
      used as a player-history aggregate FILTERED by match_time < T. UNSAFE as direct
      game-T feature. The TARGET singleton is conceptually a sub-class of this category
      but tagged separately for sentinel-clarity.
  - IN_GAME_HISTORICAL: Available during/after game completion (e.g., APM, SQ, supplyCappedPercent,
      header_elapsedGameLoops, is_apm_unparseable). SAFE only when used as a player-history
      aggregate FILTERED by match_time < T. UNSAFE as direct game-T feature.
  - PRE_GAME: Available before game T starts (e.g., MMR, leaderboard, race, map).
      Safe to use as feature for game T without temporal filtering.
  - IDENTITY: Stable identifiers (replay_id, toon_id, profileId). No temporal constraint;
      not a feature input but a join key.
  - CONTEXT: Game/match metadata (started_timestamp, mapName, gameLoops). PRE_GAME-equivalent
      for temporal purposes; available before game T.
- id: I6
  description: VIEW DDL stored verbatim in 01_04_02_post_cleaning_validation.json
    sql_queries.
- id: I9
  description: No features computed. VIEW is a JOIN projection of replay_players_raw
    x replays_meta_raw with minimal quality corrections. 01_04_02 modifies the column
    SET (drops/adds), never the values. No imputation, scaling, or encoding. Phase
    02 owns those transforms.
- id: I10
  description: All replay_id derivation traces back to filename relative to raw_dir
    (per Invariant I10). Both VIEWs in this dataset (matches_flat_clean and player_history_all)
    share this constraint.
