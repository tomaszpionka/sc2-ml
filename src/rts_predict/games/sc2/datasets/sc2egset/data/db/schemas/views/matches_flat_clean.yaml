invariants:
- id: I3
  description: 'matches_flat_clean is the prediction-target VIEW. ALL columns must
    be PRE_GAME (available before game T starts). IN_GAME_HISTORICAL and POST_GAME_HISTORICAL
    columns are excluded by construction from direct feature use. ADDENDUM 2026-04-18:
    duration_seconds + is_duration_suspicious are POST_GAME_HISTORICAL (tokens in
    notes field). header_elapsedGameLoops is NOT directly exposed; it is aggregated
    via a JOIN to player_history_all. I3 is preserved: no IN_GAME_HISTORICAL column
    is directly present. Phase 02 must apply match_time < T filter before using POST_GAME_HISTORICAL
    columns as historical aggregates.'
  provenance_categories:
  - TARGET: THE prediction label itself (Win/Loss/Undecided/Tie). Singleton sentinel
      -- only the result column carries this tag. Never aggregate without temporal
      exclusion (match_time < T); using it as a direct game-T feature IS target leakage.
  - POST_GAME_HISTORICAL: The game-T outcome itself or any feature derived from it
      (e.g., is_decisive_result, future Phase-02 win-rate aggregates, duration_seconds,
      is_duration_suspicious). SAFE only when used as a player-history aggregate FILTERED
      by match_time < T. UNSAFE as direct game-T feature. NOT PRESENT in this VIEW
      as direct features -- all POST_GAME_HISTORICAL cols are available for historical
      aggregation only.
  - IN_GAME_HISTORICAL: Available during/after game completion (e.g., APM, SQ, supplyCappedPercent,
      header_elapsedGameLoops). NOT PRESENT in this VIEW by construction (I3). header_elapsedGameLoops
      is accessed only via aggregation in duration_per_replay CTE -- not exposed directly.
  - PRE_GAME: Available before game T starts (e.g., race, map, skill flags). Safe
      to use as feature for game T without temporal filtering.
  - IDENTITY: Stable identifiers (replay_id, toon_id, profileId). No temporal constraint;
      not a feature input but a join key.
  - CONTEXT: Game/match metadata (started_timestamp, mapName, gameLoops). PRE_GAME-equivalent
      for temporal purposes; available before game T.
