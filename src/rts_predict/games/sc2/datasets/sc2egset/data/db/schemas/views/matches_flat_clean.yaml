  filter: true_1v1_decisive CTE (exactly 2 players, 1 Win + 1 Loss); mmr_valid CTE
    (no MMR<0 player in replay)
  scope: True 1v1 decisive replays only. 22,209 replays, 44,418 rows (2 per replay).
