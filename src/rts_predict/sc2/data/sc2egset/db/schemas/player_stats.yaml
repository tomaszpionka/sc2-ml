notes: "VIEW (not a base table) over tracker_events_raw WHERE event_type = 'PlayerStats'.\n\
  One row per player per PlayerStats snapshot per match.\nRow grain: one (match_id,\
  \ game_loop, player_id) triple = one row (~4.56M rows).\nProduced by _build_player_stats_view_query()\
  \ in ingestion.py; the CREATE OR REPLACE\nVIEW statement is run by load_in_game_data_to_duckdb().\
  \ Field mapping defined in\nPLAYER_STATS_FIELD_MAP in schemas.py.\n\nColumn naming\
  \ convention for the 30+ subcategory columns:\n{resource}_{category}_{subcategory}\
  \ where:\n  resource = minerals | vespene\n  category = collection_rate | current\
  \ | friendly_fire | killed | lost | used_active_forces\n             | used_current\
  \ | used_in_progress\n  subcategory = army | economy | technology\n\n'killed' and\
  \ 'lost' fields are cumulative totals (increasing monotonically over game_loop).\n\
  'current', 'collection_rate', 'used_*' fields are instantaneous snapshots.\nAll\
  \ values are FLOAT (cast from JSON via CAST(json_extract(...) AS FLOAT)).\nPhase\
  \ 4 (in-game statistics profiling) will use this view as the primary source\nfor\
  \ time-series economic features.\n"
